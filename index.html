<!DOCTYPE html>
<html>
<head>
  <title>Meter SaaS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    button {
      background: #2c7be5;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #1a5edb;
    }

    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Meter Reading Upload</h2>

    <input type="text" id="unit" placeholder="Enter Unit (e.g. A1)">
    <input type="file" id="imageInput" accept="image/*">

    <button onclick="uploadImage()">Process Meter</button>

    <div id="result"></div>
  </div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzI1AAeSPUvu0hj-gE5VVgSRdzXNnJFA1gqd8UyrcTE-NoI6eopGaKUCoyqk4g-1QqS/exec";

function uploadImage() {

  const file = document.getElementById("imageInput").files[0];
  const unit = document.getElementById("unit").value;

  if (!file || !unit) {
    alert("Please enter unit and select image.");
    return;
  }

  const reader = new FileReader();

  reader.onload = function() {

    const base64 = reader.result.split(",")[1];

    const formData = new FormData();
    formData.append("unit", unit);
    formData.append("image", base64);

    fetch(API_URL, {
      method: "POST",
      body: formData
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === "success") {
        document.getElementById("result").innerHTML =
          "Reading: " + data.reading;
      } else {
        document.getElementById("result").innerHTML =
          "Error: " + data.message;
      }
    })
    .catch(error => {
      document.getElementById("result").innerHTML =
        "Request failed.";
    });

  };

  reader.readAsDataURL(file);
}
</script>
</body>
</html>

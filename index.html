<!DOCTYPE html>
<html>
<head>
  <title>Meter SaaS - Bulk Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background:#f4f6f9; padding:40px; text-align:center; }
    .card { background:white; padding:30px; border-radius:10px; max-width:500px; margin:auto; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
    input, button { width:100%; padding:12px; margin-top:15px; border-radius:6px; border:1px solid #ddd; }
    button { background:#2c7be5; color:white; border:none; cursor:pointer; }
    #result { margin-top:20px; text-align:left; }
  </style>
</head>

<body>

<div class="card">
  <h2>Weekly Meter Folder Processor</h2>

  <input type="text" id="folderId" placeholder="Paste Google Drive Folder ID">

  <button onclick="processFolder()">Process Weekly Folder</button>

  <div id="result"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzI1AAeSPUvu0hj-gE5VVgSRdzXNnJFA1gqd8UyrcTE-NoI6eopGaKUCoyqk4g-1QqS/exec";

function processFolder() {

  const folderId = document.getElementById("folderId").value;

  if (!folderId) {
    alert("Enter folder ID");
    return;
  }

  const formData = new FormData();
  formData.append("folderId", folderId);

  document.getElementById("result").innerHTML = "Processing...";

  fetch(API_URL, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "success") {

      let html = "<b>Processed: " + data.processed + " meters</b><br><br>";

      data.data.forEach(item => {
        html += item.unit + " → " + item.reading + "<br>";
      });

      document.getElementById("result").innerHTML = html;

    } else {
      document.getElementById("result").innerHTML = "Error: " + data.message;
    }

  })
  .catch(err => {
    document.getElementById("result").innerHTML = "Request failed.";
  });
}

</script>

</body>
</html>
